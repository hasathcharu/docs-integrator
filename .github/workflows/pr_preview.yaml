name: PR Preview (Vercel)

on:
  issue_comment:
    types: [created]
  workflow_dispatch:
    inputs:
      pr:
        description: "PR number"
        required: true
      action:
        description: "deploy or remove"
        required: false
        default: "deploy"

permissions:
  contents: read
  pull-requests: write

env:
  VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

jobs:
  deploy:
    name: Deploy preview
    if: |
      (github.event_name == 'workflow_dispatch' && inputs.action == 'deploy') ||
      (github.event_name == 'issue_comment' &&
       github.event.issue.pull_request != null &&
       startsWith(github.event.comment.body, '/preview') &&
       !startsWith(github.event.comment.body, '/preview-remove') &&
       contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association))
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: en
    steps:
      - name: Resolve PR number and head SHA
        id: pr
        working-directory: .
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          EVENT_NAME: ${{ github.event_name }}
          DISPATCH_PR: ${{ inputs.pr }}
          COMMENT_PR: ${{ github.event.issue.number }}
        run: |
          set -euo pipefail
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            num="$DISPATCH_PR"
          else
            num="$COMMENT_PR"
          fi
          sha=$(gh pr view "$num" --repo "$REPO" --json headRefOid -q .headRefOid)
          echo "num=$num" >> "$GITHUB_OUTPUT"
          echo "sha=$sha" >> "$GITHUB_OUTPUT"

      - name: Checkout PR head
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.pr.outputs.sha }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: en/package-lock.json

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel environment
        run: vercel pull --yes --environment=preview --token=$VERCEL_TOKEN

      - name: Build with Vercel
        run: vercel build --token=$VERCEL_TOKEN

      - name: Deploy prebuilt artifact
        id: deploy
        run: |
          url=$(vercel deploy --prebuilt --archive=tgz --token=$VERCEL_TOKEN)
          echo "url=$url" >> "$GITHUB_OUTPUT"

      - name: Comment preview URL on PR
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: pr-preview
          number: ${{ steps.pr.outputs.num }}
          message: |
            <!-- pr-preview-marker -->
            Preview deployed: ${{ steps.deploy.outputs.url }}

            Commit: ${{ steps.pr.outputs.sha }}

  teardown:
    name: Tear down preview
    if: |
      (github.event_name == 'workflow_dispatch' && inputs.action == 'remove') ||
      (github.event_name == 'issue_comment' &&
       github.event.issue.pull_request != null &&
       startsWith(github.event.comment.body, '/preview-remove') &&
       contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association))
    runs-on: ubuntu-latest
    steps:
      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Resolve PR number
        id: pr
        env:
          EVENT_NAME: ${{ github.event_name }}
          DISPATCH_PR: ${{ inputs.pr }}
          COMMENT_PR: ${{ github.event.issue.number }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            echo "num=$DISPATCH_PR" >> "$GITHUB_OUTPUT"
          else
            echo "num=$COMMENT_PR" >> "$GITHUB_OUTPUT"
          fi

      - name: Find and remove preview deployment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ steps.pr.outputs.num }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          body=$(gh api "repos/$REPO/issues/$PR_NUMBER/comments" \
            --jq '.[] | select(.body | contains("<!-- pr-preview-marker -->")) | .body' \
            | head -n1 || true)
          if [ -z "$body" ]; then
            echo "No preview marker comment found; nothing to tear down."
            exit 0
          fi
          url=$(echo "$body" | grep -oE 'https://[a-zA-Z0-9.-]+\.vercel\.app' | head -n1 || true)
          if [ -z "$url" ]; then
            echo "Marker comment found but no Vercel URL parsed; skipping."
            exit 0
          fi
          echo "Removing $url"
          vercel remove "$url" --yes --token=$VERCEL_TOKEN || echo "vercel remove failed (already gone?); continuing."

      - name: Update sticky comment
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: pr-preview
          number: ${{ steps.pr.outputs.num }}
          message: |
            <!-- pr-preview-marker -->
            Preview removed.
